spring:
  application:
    name: exchange-rate-service

  datasource:
    url: jdbc:h2:file:./data/exchangerates;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 500
        order_inserts: true

  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    serialization:
      write-dates-as-timestamps: false

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500

bundesbank:
  api:
    base-url: https://api.statistiken.bundesbank.de/rest
    dataflow: BBEX3
    key: D..EUR.BB.AC.000

exchange-rate:
  scheduler:
    cron: "0 0 18 * * MON-FRI"
