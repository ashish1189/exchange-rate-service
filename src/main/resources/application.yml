spring:
  application:
    name: exchange-rate-service

  datasource:
    url: jdbc:h2:mem:exchangerates;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

bundesbank:
  api:
    base-url: https://api.statistiken.bundesbank.de/rest
    dataflow: BBEX3
    key: D..EUR.BB.AC.000

exchange-rate:
  scheduler:
    cron: "0 0 18 * * MON-FRI"
